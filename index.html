<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARLANXEO | Supply Chain Safety Training</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="welcome-screen" class="card">
        <img src="images/arlanxeo_logo.png" alt="Company Logo" class="logo">
        <h1>Welcome to ARLANXEO</h1>
        <p>Please select your preferred language to start:</p>
        
        <div class="flags-container">
            <div class="flag-item" onclick="selectLang('en', this)">
                <img src="https://flagcdn.com/w80/gb.png" alt="English">
                <p>English</p>
            </div>
            <div class="flag-item" onclick="selectLang('nl', this)">
                <img src="https://flagcdn.com/w80/nl.png" alt="Dutch">
                <p>Dutch</p>
            </div>
            <div class="flag-item" onclick="selectLang('fr', this)">
                <img src="https://flagcdn.com/w80/fr.png" alt="French">
                <p>French</p>
            </div>
            <div class="flag-item" onclick="selectLang('de', this)">
                <img src="https://flagcdn.com/w80/de.png" alt="German">
                <p>German</p>
            </div>
            <div class="flag-item" onclick="selectLang('pl', this)">
                <img src="https://flagcdn.com/w80/pl.png" alt="Polish">
                <p>Polish</p>
            </div>
            <div class="flag-item" onclick="selectLang('pt', this)">
                <img src="https://flagcdn.com/w80/br.png" alt="Brazil">
                <p>Portuguese</p>
            </div>
            <div class="flag-item" onclick="selectLang('zh', this)">
                <img src="https://flagcdn.com/w80/cn.png" alt="China">
                <p>Chinese</p>
            </div>
            <div class="flag-item" onclick="selectLang('ar', this)">
               <img src="https://flagcdn.com/w80/sa.png" alt="Arabic">
               <p>Arabic</p>
            </div>
            <div class="flag-item" onclick="selectLang('es', this)">
              <img src="https://flagcdn.com/w80/es.png" alt="Spanish">
              <p>Spanish</p>
            </div>
        </div>

        <button id="start-btn" class="btn-primary" style="display: none;" onclick="startTest()">Start Training →</button>
    </div>

    <div id="test-screen" class="card" style="display: none;">
        <div class="video-wrapper">
            <video id="main-video" controls onended="startQuiz()">
                <source id="video-source" src="" type="video/mp4">
            </video>
        </div>

        <p id="video-hint" style="margin-top: 15px; color: #d9534f; font-weight: 600; font-size: 15px;">
            ⚠️ Please watch the video to the end to unlock the safety quiz.
        </p>

        <div id="quiz-container" style="display: none;">
            <div id="question-card"></div>
        </div>
    </div>

    <div id="result-screen" class="card" style="display: none;">
        <div id="result-message"></div>
        <button id="retry-btn" class="btn-primary" onclick="location.reload()">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
